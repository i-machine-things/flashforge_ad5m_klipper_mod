<svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 25 25">
  <!-- cable -->
  <line x1="12" y1="0" x2="12" y2="5" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
  <!-- connector body -->
  <rect x="3" y="5" width="18" height="13" rx="1" fill="none" stroke="#22C55E" stroke-width="2"/>
  <!-- 3 contact pins (3px wide, 2px gap, 7px tall) -->
  <rect x="6"  y="8" width="3" height="7" fill="#22C55E"/>
  <rect x="11" y="8" width="3" height="7" fill="#22C55E"/>
  <rect x="16" y="8" width="3" height="7" fill="#22C55E"/>
  <!-- locking tab -->
  <rect x="9" y="17" width="6" height="4" rx="1" fill="#22C55E"/>
</svg>
