name: Build Lite Variant

on:
  push:
    branches: [master]
    paths:
      - 'build_overlays/**'
      - 'build_scripts/**'
      - 'printer_configs/**'
      - '.github/workflows/build-lite.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # needed for git describe

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential gcc g++ make git wget unzip \
            bc cpio rsync python3 file libncurses-dev \
            libssl-dev dos2unix

      - name: Fix line endings
        run: find build_scripts -name "*.sh" -exec dos2unix {} +

      - name: Cache buildroot downloads
        uses: actions/cache@v4
        with:
          path: submodules/buildroot/dl
          key: br-dl-${{ hashFiles('build_scripts/buildroot/configs/**') }}-${{ github.sha }}
          restore-keys: |
            br-dl-${{ hashFiles('build_scripts/buildroot/configs/**') }}-
            br-dl-

      - name: Cache buildroot host tools
        uses: actions/cache@v4
        with:
          path: build_output/buildroot/variant-lite/host
          key: br-host-${{ hashFiles('build_scripts/buildroot/configs/**') }}-${{ hashFiles('submodules/buildroot/.git') }}
          restore-keys: |
            br-host-${{ hashFiles('build_scripts/buildroot/configs/**') }}-
            br-host-

      - name: Prepare variant
        run: ./build_scripts/build.sh prepare_variant lite

      - name: Build variant
        run: ./build_scripts/build.sh build_variant lite

      - name: Package variant
        run: ./build_scripts/build.sh package_variant lite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: klipper-mod-lite-${{ github.sha }}
          path: build_output/packages/*.tgz
          retention-days: 30
