name: Build Lite Variant

on:
  push:
    branches: [master]
    paths:
      - 'build_overlays/**'
      - 'build_scripts/**'
      - 'printer_configs/**'
      - '.github/workflows/build-lite.yml'
  pull_request:
    branches: [master]
    paths:
      - 'build_overlays/**'
      - 'build_scripts/**'
      - 'printer_configs/**'
      - '.github/workflows/build-lite.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # needed for git describe

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential gcc g++ make git wget unzip \
            bc cpio rsync python3 file libncurses-dev \
            libssl-dev dos2unix

      - name: Fix line endings
        run: find build_scripts -name "*.sh" -exec dos2unix {} +

      - name: Cache buildroot downloads
        uses: actions/cache@v4
        with:
          path: submodules/buildroot/dl
          key: br-dl-${{ hashFiles('build_scripts/buildroot/configs/**') }}
          restore-keys: |
            br-dl-${{ hashFiles('build_scripts/buildroot/configs/**') }}-
            br-dl-

      - name: Cache buildroot SDK
        uses: actions/cache@v4
        with:
          path: build_output/buildroot/sdk
          key: br-sdk-${{ hashFiles('build_scripts/buildroot/configs/sdk') }}-${{ hashFiles('submodules/buildroot/.git') }}
          restore-keys: |
            br-sdk-${{ hashFiles('build_scripts/buildroot/configs/sdk') }}-
            br-sdk-

      - name: Cache buildroot host tools
        uses: actions/cache@v4
        with:
          path: build_output/buildroot/variant-lite/host
          key: br-host-${{ hashFiles('build_scripts/buildroot/configs/**') }}-${{ hashFiles('submodules/buildroot/.git') }}
          restore-keys: |
            br-host-${{ hashFiles('build_scripts/buildroot/configs/**') }}-
            br-host-

      - name: Pre-download large toolchain sources
        run: |
          # buildroot's mirrors (ftpmirror.gnu.org) are unreliable for GCC.
          # Pre-download to the buildroot DL cache so the build never fetches live.
          GCC_VER="14.2.0"
          GCC_FILE="gcc-${GCC_VER}.tar.xz"
          GCC_DIR="submodules/buildroot/dl/gcc"
          mkdir -p "${GCC_DIR}"
          if [ -f "${GCC_DIR}/${GCC_FILE}" ]; then
            echo "GCC already in download cache — skipping"
          else
            echo "Downloading ${GCC_FILE}..."
            DOWNLOADED=false
            for URL in \
              "https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VER}/${GCC_FILE}" \
              "https://mirrors.kernel.org/gnu/gcc/gcc-${GCC_VER}/${GCC_FILE}" \
              "https://gcc.gnu.org/pub/gcc/releases/gcc-${GCC_VER}/${GCC_FILE}"; do
              echo "  Trying ${URL}"
              if wget -q -t 3 --connect-timeout=30 \
                   -O "${GCC_DIR}/${GCC_FILE}.tmp" "${URL}" && \
                 [ -s "${GCC_DIR}/${GCC_FILE}.tmp" ]; then
                mv "${GCC_DIR}/${GCC_FILE}.tmp" "${GCC_DIR}/${GCC_FILE}"
                echo "  OK — downloaded from ${URL}"
                DOWNLOADED=true
                break
              fi
              rm -f "${GCC_DIR}/${GCC_FILE}.tmp"
              echo "  FAILED — trying next mirror"
            done
            if [ "${DOWNLOADED}" = false ]; then
              echo "WARNING: could not pre-download GCC; buildroot will attempt its own download"
            fi
          fi

      - name: Prepare SDK
        run: ./build_scripts/build.sh prepare_sdk

      - name: Build SDK
        run: ./build_scripts/build.sh build_sdk

      - name: Prepare variant
        run: ./build_scripts/build.sh prepare_variant lite

      - name: Build variant
        run: ./build_scripts/build.sh build_variant lite

      - name: Package variant
        run: ./build_scripts/build.sh package_variant lite

      - name: Set artifact name
        id: artifact
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=klipper-mod-lite-pr${{ github.event.number }}-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "retention=7" >> $GITHUB_OUTPUT
          else
            echo "name=klipper-mod-lite-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "retention=30" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: build_output/packages/*.tgz
          retention-days: ${{ steps.artifact.outputs.retention }}

      - name: Comment artifact link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- klipper-mod-build-artifact -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactName = `klipper-mod-lite-pr${context.payload.pull_request.number}-${context.sha}`;
            const body = [
              marker,
              '### Build artifact ready',
              '',
              `Lite variant built for this PR — download from the [Actions run](${runUrl}) under **Artifacts**.`,
              '',
              `**Artifact:** \`${artifactName}\``,
              '_Retained for 7 days._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
